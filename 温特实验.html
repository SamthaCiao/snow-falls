<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>温特实验 · 松筠长青</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'SF Mono', 'Consolas', 'Monaco', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .wintert-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 1.25rem 1rem 3rem;
            min-height: 100vh;
        }
        /* 顶部标题区 - 科技感 */
        .wintert-hero {
            text-align: center;
            padding: 2.5rem 1rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 1.5rem;
        }
        .wintert-hero .main-title {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: #fff;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .wintert-hero .subtitle {
            font-size: 0.85rem;
            color: #888;
            letter-spacing: 0.15em;
        }
        .wintert-hero .author {
            font-size: 0.8rem;
            color: #555;
            margin-top: 0.75rem;
            font-style: normal;
        }
        /* 对话/终端区域 */
        .terminal {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 1.25rem 1rem;
            margin-bottom: 1rem;
            position: relative;
        }
        .terminal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
            border-radius: 8px 8px 0 0;
        }
        .terminal-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-bottom: 0.75rem;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .terminal-header .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
        }
        .terminal-header .dot:nth-child(1) { background: #555; }
        .terminal-header .dot:nth-child(2) { background: #555; }
        .terminal-header .dot:nth-child(3) { background: #555; }
        .terminal-title {
            font-size: 0.7rem;
            color: #666;
            letter-spacing: 0.1em;
            margin-left: 8px;
        }
        .line {
            margin-bottom: 0.85em;
            line-height: 1.75;
            font-size: 0.95rem;
            color: #c0c0c0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .line.prompt {
            color: #6a9fb5;
        }
        .line.time {
            color: #666;
            font-size: 0.8rem;
        }
        .line.speaker-lu {
            color: #9eb8d4;
        }
        .line.speaker-xue {
            color: #c4a8d4;
        }
        /* 光标 */
        .cursor-wrap {
            display: inline-block;
            margin-left: 2px;
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: #00ff88;
            animation: blink 0.9s step-end infinite;
            vertical-align: text-bottom;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        /* 扫描线/科技纹理（极弱） */
        .wintert-container::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 0;
        }
        .terminal, .wintert-hero {
            position: relative;
            z-index: 1;
        }
        .unlock-wrap {
            text-align: center;
            padding: 1.5rem 1rem;
            position: relative;
            z-index: 1;
        }
        .unlock-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            color: #9eb8d4;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 0.05em;
            transition: background 0.2s, border-color 0.2s;
        }
        .unlock-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.25);
        }
        .unlock-btn.qa-btn {
            color: #c4a8d4;
            text-decoration: none;
            display: inline-block;
        }
        .unlock-btn.qa-btn:hover {
            color: #e0d0e8;
        }
        /* 口令弹窗 */
        .pass-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .pass-modal-overlay.show {
            display: flex;
        }
        .pass-modal {
            background: #12121a;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 1.5rem 1.75rem;
            max-width: 360px;
            width: 100%;
        }
        .pass-modal .modal-label {
            display: block;
            color: #c0c0c0;
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
        }
        .pass-modal .input-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .pass-modal .pass-input {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #e0e0e0;
            padding: 0.5rem 0.75rem;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .pass-modal .pass-input::placeholder {
            color: #666;
        }
        .pass-modal .hint-wrap {
            position: relative;
        }
        .pass-modal .hint-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.25);
            color: #888;
            font-size: 0.75rem;
            cursor: help;
        }
        .pass-modal .hint-icon:hover {
            color: #9eb8d4;
            border-color: #9eb8d4;
        }
        .pass-modal .hint-tooltip {
            visibility: hidden;
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            margin-left: 8px;
            padding: 0.4rem 0.6rem;
            background: #1a1a24;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #9eb8d4;
            font-size: 0.75rem;
            white-space: nowrap;
            max-width: 220px;
            white-space: normal;
            z-index: 1;
        }
        .pass-modal .hint-wrap:hover .hint-tooltip {
            visibility: visible;
        }
        .pass-modal .remaining {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
        .pass-modal .btn-confirm {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            color: #9eb8d4;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: inherit;
        }
        .pass-modal .btn-confirm:hover {
            background: rgba(255,255,255,0.12);
        }
        .pass-modal .exhausted-msg {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .page-footer.wintert-footer {
            text-align: center;
            padding: 2rem 1rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin-top: 1rem;
            position: relative;
            z-index: 1;
        }
        .page-footer.wintert-footer .back-link {
            display: inline-block;
            color: #9eb8d4;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .page-footer.wintert-footer .back-link:hover {
            color: #c4a8d4;
            text-decoration: underline;
        }
        /* 3 次输错后引导点击返回首页的动效 */
        body.guide-back-home .page-footer.wintert-footer .back-link {
            animation: guide-pulse 1.2s ease-in-out infinite;
        }
        @keyframes guide-pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(158, 184, 212, 0.4); }
            50% { opacity: 0.9; box-shadow: 0 0 0 8px rgba(158, 184, 212, 0); }
        }
        .pass-modal .qa-in-form {
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .pass-modal .btn-close {
            margin-top: 0.75rem;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #888;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
        }
        .pass-modal .btn-close:hover {
            color: #9eb8d4;
        }
        /* 移动端 */
        @media (max-width: 768px) {
            .wintert-container {
                padding: 1rem 0.75rem 2.5rem;
                padding-left: max(0.75rem, env(safe-area-inset-left));
                padding-right: max(0.75rem, env(safe-area-inset-right));
                padding-bottom: max(2.5rem, env(safe-area-inset-bottom));
            }
            .wintert-hero { padding: 2rem 0.5rem 1.5rem; }
            .wintert-hero .main-title { font-size: 1.35rem; letter-spacing: 0.12em; }
            .line { font-size: 1rem; }
            .terminal { padding: 1rem 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="wintert-container">
        <header class="wintert-hero">
            <h1 class="main-title">温特实验</h1>
            <p class="subtitle">Went's Experiment</p>
            <div class="author">松筠长青</div>
        </header>

        <div class="terminal" id="terminal">
            <div class="terminal-header">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                <span class="terminal-title">WENT_EXP · 松筠长青</span>
            </div>
            <div class="line prompt" id="line1"></div>
            <div class="line" id="line2"></div>
            <div class="line" id="line3"></div>
            <div class="line" id="line4"></div>
            <div class="line" id="line5"></div>
            <div class="line" id="line6"></div>
            <div class="line" id="line7"></div>
            <div id="cursorWrap" class="cursor-wrap"><span class="cursor" id="cursor"></span></div>
        </div>
        <div class="unlock-wrap" id="unlockWrap" style="display:none;">
            <button type="button" class="unlock-btn" id="unlockBtn">查看全文</button>
        </div>
        <footer class="page-footer wintert-footer">
            <a href="index.html" class="back-link">← 返回首页</a>
        </footer>
    </div>

    <div class="pass-modal-overlay" id="passModalOverlay">
        <div class="pass-modal" id="passModal">
            <div id="passModalForm">
                <label class="modal-label" for="passInput">请输入口令查看全文</label>
                <div class="input-row">
                    <input type="text" class="pass-input" id="passInput" placeholder="请输入口令" autocomplete="off" />
                    <span class="hint-wrap">
                        <span class="hint-icon" aria-label="提示">?</span>
                        <span class="hint-tooltip" id="passHint">the subject of the academic competition he participated in?</span>
                    </span>
                </div>
                <p class="remaining" id="passRemaining"></p>
                <button type="button" class="btn-confirm" id="passConfirm">确认</button>
                <div class="qa-in-form" id="passModalQaInForm" style="display:none;">
                    <a href="https://snow-falls-q-a.ai-builders.space/" target="_blank" rel="noopener" class="unlock-btn qa-btn">小说问答系统</a>
                </div>
            </div>
            <div id="passModalExhausted" style="display:none;">
                <p class="exhausted-msg">实验启动失败</p>
                <button type="button" class="btn-close" id="passModalCloseExhausted">关闭</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var contents = [
                { id: 'line1',  text: '> 番外 温特实验', delay: 0 },
                { id: 'line2',  text: '一颗添加了生长激素的琼脂，还能不能帮助世界树长出从未有过的分支？', delay: 400 },
                { id: 'line3',  text: '如果《影化成殇》不算传统意义上的美梦。那也许本篇可以是真正意义上的美梦。', delay: 800 },
                { id: 'line4',  text: '这是一个控制变量法实验。', delay: 1200 },
                { id: 'line5',  text: '这是一个当恨归位，爱仍在寻找自己本来所在的故事。', delay: 1600 },
                { id: 'line6',  text: '—————————————————', delay: 2000 },
                { id: 'line7',  text: '2016-03-01 新对话。请输入初始人设 prompt:', delay: 2400 },
               ];

            var cursorEl = document.getElementById('cursor');
            var cursorWrap = document.getElementById('cursorWrap');

            function typeAt(el, str, speed, after) {
                if (!el) return Promise.resolve();
                el.textContent = '';
                var i = 0;
                return new Promise(function(resolve) {
                    function tick() {
                        if (i < str.length) {
                            var ch = str[i];
                            if (ch === '\n') el.appendChild(document.createElement('br'));
                            else el.appendChild(document.createTextNode(ch));
                            i++;
                            setTimeout(tick, speed);
                        } else {
                            if (after) after();
                            resolve();
                        }
                    }
                    tick();
                });
            }

            function run() {
                var baseDelay = 800;
                var typingSpeed = 28;
                var lastLineEl = null;

                function schedule(idx) {
                    if (idx >= contents.length) {
                        cursorWrap.style.display = 'inline-block';
                        showUnlockButton();
                        return;
                    }
                    var item = contents[idx];
                    var el = document.getElementById(item.id);
                    if (!el) {
                        schedule(idx + 1);
                        return;
                    }
                    cursorWrap.style.display = 'none';
                    lastLineEl = el;
                    setTimeout(function() {
                        typeAt(el, item.text, typingSpeed, function() {
                            cursorWrap.style.display = 'inline-block';
                            el.appendChild(cursorWrap);
                            setTimeout(function() {
                                if (idx + 1 < contents.length) {
                                    if (cursorWrap.parentNode) cursorWrap.parentNode.removeChild(cursorWrap);
                                    document.getElementById('terminal').appendChild(cursorWrap);
                                }
                                schedule(idx + 1);
                            }, 380);
                        });
                    }, item.delay);
                }
                schedule(0);
            }

            var wrongAttempts = 0;
            var MAX_ATTEMPTS = 3;

            function openPassModal() {
                var overlay = document.getElementById('passModalOverlay');
                var form = document.getElementById('passModalForm');
                var exhausted = document.getElementById('passModalExhausted');
                var remainingEl = document.getElementById('passRemaining');
                var input = document.getElementById('passInput');
                var qaInForm = document.getElementById('passModalQaInForm');
                if (!overlay || !form || !exhausted) return;
                var remaining = Math.max(0, MAX_ATTEMPTS - wrongAttempts);
                if (remaining <= 0) {
                    form.style.display = 'none';
                    exhausted.style.display = 'block';
                } else {
                    form.style.display = 'block';
                    exhausted.style.display = 'none';
                    remainingEl.textContent = '剩余 ' + remaining + ' 次机会';
                    input.value = '';
                    input.focus();
                    if (qaInForm) qaInForm.style.display = wrongAttempts >= 1 ? 'block' : 'none';
                }
                overlay.classList.add('show');
            }

            function closePassModal() {
                var overlay = document.getElementById('passModalOverlay');
                if (overlay) overlay.classList.remove('show');
            }

            function showUnlockButton() {
                var wrap = document.getElementById('unlockWrap');
                var btn = document.getElementById('unlockBtn');
                if (!wrap || !btn) return;
                wrap.style.display = 'block';
                btn.onclick = openPassModal;

                var overlay = document.getElementById('passModalOverlay');
                var input = document.getElementById('passInput');
                var confirmBtn = document.getElementById('passConfirm');
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) closePassModal();
                });
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') closePassModal();
                });
                if (confirmBtn) {
                    confirmBtn.onclick = function() {
                        var pass = (input.value || '').trim();
                        if (pass.toLowerCase() === 'biology') {
                            window.location.href = '番外 · 温特实验.html';
                        } else if (pass !== '') {
                            wrongAttempts++;
                            alert('access denied');
                            if (wrongAttempts >= MAX_ATTEMPTS) {
                                var form = document.getElementById('passModalForm');
                                var exhausted = document.getElementById('passModalExhausted');
                                if (form) form.style.display = 'none';
                                if (exhausted) exhausted.style.display = 'block';
                            } else {
                                closePassModal();
                            }
                        }
                    };
                }
                if (input) {
                    input.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') confirmBtn.click();
                    });
                }
                var closeExhaustedBtn = document.getElementById('passModalCloseExhausted');
                if (closeExhaustedBtn) {
                    closeExhaustedBtn.onclick = function() {
                        closePassModal();
                        document.body.classList.add('guide-back-home');
                        var backLink = document.querySelector('.page-footer.wintert-footer .back-link');
                        if (backLink) backLink.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    };
                }
            }

            if (document.readyState === 'loading')
                document.addEventListener('DOMContentLoaded', run);
            else
                run();
        })();
    </script>
</body>
</html>
