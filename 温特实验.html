                function rhex(n) {

            }

            function verifyPassword(input) {
                return md5((input || '').toLowerCase().trim()) === PASS_HASH;
            }

            function getTypingSpeed(text) {
                var len = (text || '').length;
                if (len < 50) return 80;
                if (len < 200) return 60;
                return 40;
            }

            function scrollScrollEvery(textLen) {
                if (textLen < 50) return 12;
                if (textLen < 200) return 24;
                return 40;
            }

            function placeCursorAtEnd(el) {
                cursorWrap.style.display = 'inline-block';
                if (cursorWrap.parentNode) cursorWrap.parentNode.removeChild(cursorWrap);
                el.appendChild(cursorWrap);
            }

            /**
             * 打字跟读：把当前行底部对齐到视口约 68% 高度（偏下），下方留约 1/3 留白，
             * 避免整句贴在屏幕最底端。
             */
            var scrollPending = false;
            function scrollTypingComfortZone(el) {
                if (!el || scrollPending) return;
                scrollPending = true;
                requestAnimationFrame(function() {
                    scrollPending = false;
                    try {
                        var rect = el.getBoundingClientRect();
                        var vh = window.innerHeight || document.documentElement.clientHeight;
                        if (vh < 200) return;
                        var targetBottom = vh * 0.68;
                        var delta = rect.bottom - targetBottom;
                        if (Math.abs(delta) < 12) return;
                        window.scrollBy({ top: delta, left: 0, behavior: 'auto' });
                    } catch (e) {}
                });
            }

            function typeAt(el, str, speed, after) {
                if (!el) return Promise.resolve();
                el.textContent = '';
                var i = 0;
                var scrollEvery = scrollScrollEvery(str.length);
                var reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                if (reducedMotion) speed = 0;
                placeCursorAtEnd(el);
                return new Promise(function(resolve) {
                    function tick() {
                        if (i < str.length) {
                            if (cursorWrap.parentNode === el) el.removeChild(cursorWrap);
                            var ch = str[i];
                            if (ch === '\n') el.appendChild(document.createElement('br'));
                            else el.appendChild(document.createTextNode(ch));
                            el.appendChild(cursorWrap);
                            i++;
                            if (!reducedMotion && (i % scrollEvery === 0 || ch === '\n')) {
                                scrollTypingComfortZone(el);
                            }
                            setTimeout(tick, speed);
                        } else {
                            placeCursorAtEnd(el);
                            if (!reducedMotion) scrollTypingComfortZone(el);
                            if (after) after();
                            resolve();
                        }
                    }
                    if (!reducedMotion) scrollTypingComfortZone(el);
                    tick();
                });
            }

            function run() {
                function schedule(idx) {
                    if (idx >= contents.length) {
                        placeCursorAtEnd(document.getElementById('terminal'));
                        showUnlockButton();
                        return;
                    }
                    var item = contents[idx];
                    var el = document.getElementById(item.id);
                    if (!el) {
                        schedule(idx + 1);
                        return;
                    }
                    setTimeout(function() {
                        typeAt(el, item.text, getTypingSpeed(item.text), function() {
                            placeCursorAtEnd(el);
                            setTimeout(function() {
                                if (idx + 1 < contents.length) {
                                    if (cursorWrap.parentNode) cursorWrap.parentNode.removeChild(cursorWrap);
                                    document.getElementById('terminal').appendChild(cursorWrap);
                                }
                                schedule(idx + 1);
                            }, 380);
                        });
                    }, item.delay);
                }
                schedule(0);
            }

            var wrongAttempts = 0;
            var MAX_ATTEMPTS = 3;

            function openPassModal() {
                var overlay = document.getElementById('passModalOverlay');
                var form = document.getElementById('passModalForm');
                var exhausted = document.getElementById('passModalExhausted');
                var remainingEl = document.getElementById('passRemaining');
                var input = document.getElementById('passInput');
                var qaInForm = document.getElementById('passModalQaInForm');
                if (!overlay || !form || !exhausted) return;
                var remaining = Math.max(0, MAX_ATTEMPTS - wrongAttempts);
                if (remaining <= 0) {
                    form.style.display = 'none';
                    exhausted.style.display = 'block';
                } else {
                    form.style.display = 'block';
                    exhausted.style.display = 'none';
                    remainingEl.textContent = '剩余 ' + remaining + ' 次机会';
                    input.value = '';
                    input.focus();
                    if (qaInForm) qaInForm.style.display = wrongAttempts >= 1 ? 'block' : 'none';
                }
                overlay.classList.add('show');
            }

            function closePassModal() {
                var overlay = document.getElementById('passModalOverlay');
                if (overlay) overlay.classList.remove('show');
            }

            function showUnlockButton() {
                var reveal = document.getElementById('postTypeReveal');
                var wrap = document.getElementById('unlockWrap');
                var btn = document.getElementById('unlockBtn');
                if (!reveal || !wrap || !btn) return;
                reveal.classList.add('is-shown');
                reveal.setAttribute('aria-hidden', 'false');
                void reveal.offsetHeight;
                reveal.classList.add('is-animating');
                var motionOk = !(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
                if (motionOk) {
                    btn.classList.add('initial-hint');
                }
                setTimeout(function() {
                    try {
                        btn.scrollIntoView({
                            behavior: motionOk ? 'smooth' : 'auto',
                            block: 'nearest',
                            inline: 'nearest'
                        });
                    } catch (e) {}
                }, 100);
                btn.onclick = function() {
                    btn.classList.remove('initial-hint');
                    openPassModal();
                };

                var overlay = document.getElementById('passModalOverlay');
                var input = document.getElementById('passInput');
                var confirmBtn = document.getElementById('passConfirm');
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) closePassModal();
                });
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') closePassModal();
                });
                if (confirmBtn) {
                    confirmBtn.onclick = function() {
                        var pass = (input.value || '').trim();
                        if (verifyPassword(pass)) {
                            window.location.href = '番外 · 温特实验.html';
                        } else if (pass !== '') {
                            wrongAttempts++;
                            alert('access denied');
                            if (wrongAttempts >= MAX_ATTEMPTS) {
                                var form = document.getElementById('passModalForm');
                                var exhausted = document.getElementById('passModalExhausted');
                                if (form) form.style.display = 'none';
                                if (exhausted) exhausted.style.display = 'block';
                            } else {
                                closePassModal();
                            }
                        }
                    };
                }
                if (input) {
                    input.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') confirmBtn.click();
                    });
                }
                var closeExhaustedBtn = document.getElementById('passModalCloseExhausted');
                if (closeExhaustedBtn) {
                    closeExhaustedBtn.onclick = function() {
                        closePassModal();
                        document.body.classList.add('guide-back-home');
                        var backLink = document.querySelector('.page-footer.wintert-footer .back-link');
                        if (backLink) backLink.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    };
                }
            }

            if (document.readyState === 'loading')
                document.addEventListener('DOMContentLoaded', run);
            else
                run();
        })();
    </script>
